name: CI

on:
  push:
    branches: [ main, dev-patrick, dev-ross ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CineSwipe.sln
        working-directory: CineSwipe

      - name: Build
        run: dotnet build CineSwipe.sln --no-restore --configuration Release
        working-directory: CineSwipe

      - name: Run tests
        run: dotnet test CineSwipe.sln --no-build --configuration Release
        working-directory: CineSwipe

      - name: Check code formatting
        run: dotnet format CineSwipe.sln --verify-no-changes --no-restore
        working-directory: CineSwipe
